<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facundo Pujol | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); --accent: #1dbf73; --text: #ffffff; --text-dim: #888888; --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; }
        
        header { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .container { max-width: 1100px; margin: -50px auto 100px; padding: 0 20px; }
        
        .section-title { margin: 60px 0 30px; font-size: 1.8rem; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; height: 1px; flex: 1; background: var(--border); }

        #portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        /* CARD LINK */
        .project-link { text-decoration: none; color: inherit; display: block; }
        .project-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 30px; 
            transition: 0.3s ease; backdrop-filter: blur(10px); height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }
        .project-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.05); }
        
        .status { background: rgba(29, 191, 115, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; display: inline-block; margin-bottom: 15px; }
        .tech-badge { font-size: 0.7rem; background: rgba(255,255,255,0.05); color: var(--text-dim); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border); margin-right: 5px; }
        
        .contact-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 50px; text-align: center; margin-top: 50px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .contact-item { padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-decoration: none; color: #fff; transition: 0.3s; }
        .contact-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 3.5rem">Facundo Pujol</h1>
        <p style="color: var(--accent); letter-spacing: 3px">WEB DEVELOPER</p>
    </header>

    <div class="container">
        <h2 class="section-title">Proyectos</h2>
        <div id="portfolio-grid"></div>

        <h2 class="section-title">Contacto</h2>
        <div class="contact-box">
            <h3>¿Hablamos?</h3>
            <div class="contact-grid">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=facundoemilianopujol02@gmail.com" target="_blank" class="contact-item">
                    <span style="display:block; color:var(--accent); font-weight:800">GMAIL</span>
                    Enviar correo
                </a>
                <a href="https://www.linkedin.com/in/facundo-pujol-70216b214/" target="_blank" class="contact-item">
                    <span style="display:block; color:var(--accent); font-weight:800">LINKEDIN</span>
                    Ver perfil
                </a>
                <a href="https://wa.me/3794142974" target="_blank" class="contact-item">
                    <span style="display:block; color:var(--accent); font-weight:800">WHATSAPP</span>
                    Mensaje directo
                </a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBA5cw9EOqZuHTPRbROdQN5f1RSvrbu6HI",
            authDomain: "dashboard-caf9a.firebaseapp.com",
            projectId: "dashboard-caf9a",
            storageBucket: "dashboard-caf9a.firebasestorage.app",
            messagingSenderId: "934880199162",
            appId: "1:934880199162:web:10a8d9f9b82d32ba7ae443"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("proyecto").onSnapshot(snap => {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const techs = p.tecnologias ? p.tecnologias.map(t => `<span class="tech-badge">${t}</span>`).join('') : '';
                
                grid.innerHTML += `
                    <a href="${p.link || '#'}" target="_blank" class="project-link">
                        <div class="project-card">
                            <div>
                                <span class="status">${p.estado || 'Finalizado'}</span>
                                <h3 style="margin-bottom:10px">${p.nombre}</h3>
                                <p style="color:var(--text-dim); font-size:0.9rem">Haz clic para ver el proyecto ↗</p>
                            </div>
                            <div style="margin-top:20px">${techs}</div>
                        </div>
                    </a>
                `;
            });
        });
    </script>
</body>
</html>
